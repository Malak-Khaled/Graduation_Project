# مثال Nginx لتشغيل Laravel (Lesahtak) بحيث تعمل مسارات مثل /api/ai/conversations
# انسخ وعدّل المسارات واسم الـ socket حسب السيرفر، ثم: sudo nginx -t && sudo systemctl reload nginx
#
# المتطلبات:
#   - document root = مجلد public داخل backend (وليس جذر المشروع)
#   - PHP-FPM يعمل (مثلاً php8.3-fpm)

server {
    listen 80;
    server_name 18.156.7.107;   # أو اسم النطاق
    root /var/www/lesahtak/backend/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;  # غيّر حسب إصدار PHP والمسار
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# ملاحظات:
# 1) إذا كان على نفس المنفذ 80 يوجد تطبيق آخر يُرجع {"status":"running"} على / فقط،
#    فـ /api قد لا يصل إلى Laravel — إما توحيد التطبيق خلف Nginx أعلاه، أو استخدام
#    منفذ/نطاق منفصل للـ API.
# 2) بعد النشر: cd backend && php artisan route:clear && php artisan config:clear
# 3) تحقق: curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1/api/up
#    (يجب أن يعطي 200 إذا Laravel يخدم /api)
