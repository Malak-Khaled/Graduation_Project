version: "3.9"

services:

  db:
    image: mysql:8.0
    container_name: graduation_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-lesahtak}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: graduation_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      APP_NAME: Lesahtak
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      APP_DEBUG: true
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-lesahtak}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      AI_DRIVER: database
      PAYMENT_GATEWAY_DRIVER: fake
      MAIL_MAILER: log
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: graduation_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public:ro
      - frontend_build:/var/www/frontend:ro
    depends_on:
      - backend
      - frontend_builder
    networks:
      - app_network

  frontend_builder:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: graduation_frontend_builder
    volumes:
      - frontend_build:/var/www/frontend
    entrypoint: ["sh", "-c", "cp -r /var/www/frontend/. /dist/ 2>/dev/null || true"]
    networks:
      - app_network

  queue:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: graduation_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-lesahtak}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

volumes:
  db_data:
  frontend_build:

networks:
  app_network:
    driver: bridge